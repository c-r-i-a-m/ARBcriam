app = "nexus-tournament-backend"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile.fly.backend"

[env]
  DATABASE_URL = "sqlite:////data/tournament.db"
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[mounts]
  source = "tournament_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
