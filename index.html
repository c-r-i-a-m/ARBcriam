<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Universal Truth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @property --angle {
      syntax: '<angle>'; initial-value: 0deg; inherits: false;
    }

    :root {
      --bg: #f7eeee;
      --surface: #eedede;
      --border: rgba(140,20,30,0.10);
      --text-primary: #1a0608;
      --text-muted: rgba(80,10,18,0.40);
      --accent: #9b1525;
      --accent-rgb: 155,21,37;
      --glow: rgba(155,21,37,0.10);
      --card-bg-a: rgba(155,21,37,0.03);
      --card-bg-b: rgba(155,21,37,0.01);
      --stamp-color: rgba(100,10,20,0.18);
    }
    html.dark {
      --bg: #0c0305;
      --surface: #180509;
      --border: rgba(200,30,50,0.12);
      --text-primary: #f5e8ea;
      --text-muted: rgba(245,220,224,0.38);
      --accent: #c0243a;
      --accent-rgb: 192,36,58;
      --glow: rgba(192,36,58,0.10);
      --card-bg-a: rgba(192,36,58,0.04);
      --card-bg-b: rgba(192,36,58,0.015);
      --stamp-color: rgba(245,200,208,0.14);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      transition: background 0.6s ease, color 0.6s ease;
    }

    /* grain */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03; pointer-events: none; z-index: 100;
    }

    /* ── ambient orbs ── */
    .orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; filter: blur(90px);
      opacity: 0; animation: orbrise 2s ease forwards;
    }
    .orb-a {
      width: 700px; height: 700px;
      background: radial-gradient(circle, var(--glow), transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      animation: orbrise 1.8s ease forwards, orbdrifta 14s ease-in-out 2s infinite;
    }
    .orb-b {
      width: 280px; height: 280px;
      background: radial-gradient(circle, var(--glow), transparent 70%);
      top: 18%; right: 12%;
      animation: orbrise 2.2s ease 0.5s forwards, orbdriftb 17s ease-in-out 2.5s infinite;
    }
    .orb-c {
      width: 200px; height: 200px;
      background: radial-gradient(circle, var(--glow), transparent 70%);
      bottom: 15%; left: 10%;
      animation: orbrise 2.5s ease 0.8s forwards, orbdriftc 19s ease-in-out 3s infinite;
    }
    @keyframes orbrise { to { opacity: 1; } }
    @keyframes orbdrifta {
      0%,100% { transform: translate(-50%,-50%) scale(1); }
      40%     { transform: translate(-53%,-47%) scale(1.06); }
      70%     { transform: translate(-47%,-53%) scale(0.96); }
    }
    @keyframes orbdriftb {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(-30px,40px) scale(1.2); }
    }
    @keyframes orbdriftc {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(20px,-30px) scale(1.1); }
    }

    /* ── grid ── */
    .grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
      pointer-events: none;
      opacity: 0; animation: fadein 2s ease 0.5s forwards;
    }

    /* ── particles canvas ── */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

    /* ── cursor spotlight ── */
    .spotlight {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      pointer-events: none; z-index: 2;
      background: radial-gradient(circle, rgba(var(--accent-rgb),0.06) 0%, transparent 65%);
      transform: translate(-50%,-50%);
      opacity: 0; transition: opacity 0.5s;
    }

    /* ── toggle ── */
    .theme-toggle {
      position: fixed; top: 28px; right: 32px; z-index: 200;
      background: none; border: none; cursor: pointer; padding: 0;
      opacity: 0; animation: fadein 1s ease 2.4s forwards;
    }
    .toggle-track {
      position: relative; width: 44px; height: 24px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--surface);
      transition: background 0.4s, border-color 0.4s;
      display: flex; align-items: center; padding: 3px;
    }
    .toggle-thumb {
      width: 16px; height: 16px; border-radius: 50%; background: var(--accent);
      transform: translateX(0);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.4s;
    }
    html.dark .toggle-thumb { transform: translateX(20px); }
    .toggle-icon {
      position: absolute; font-size: 9px; top: 50%;
      transform: translateY(-50%); transition: opacity 0.3s;
      user-select: none; line-height: 1;
    }
    .icon-sun  { left: 6px;  opacity: 1; }
    .icon-moon { right: 6px; opacity: 0.3; }
    html.dark .icon-sun  { opacity: 0.3; }
    html.dark .icon-moon { opacity: 1; }

    /* ── scene ── */
    .scene {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      flex-direction: column; padding: 40px; z-index: 10;
    }

    /* ── card ── */
    .card {
      position: relative; width: min(720px, 100%);
      padding: 64px 72px 80px;
      border: 1px solid var(--border);
      background: linear-gradient(160deg, var(--card-bg-a) 0%, var(--card-bg-b) 100%);
      backdrop-filter: blur(4px); border-radius: 2px;
      opacity: 0; transform: translateY(30px) scale(0.982);
      animation: cardrise 1.4s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
      transition: border-color 0.5s, background 0.5s;
      will-change: transform; overflow: hidden;
    }
    @keyframes cardrise { to { opacity:1; transform: translateY(0) scale(1); } }

    /* animated conic border */
    .border-glow {
      position: absolute; inset: -1px; border-radius: 3px; pointer-events: none;
      background: conic-gradient(from var(--angle), transparent 0%,
        rgba(var(--accent-rgb),0.6) 15%, transparent 30%);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      padding: 1px; opacity: 0;
      animation: borderfade 1s ease 2s forwards, spin 5s linear 3s infinite;
    }
    @keyframes borderfade { to { opacity: 1; } }
    @keyframes spin { to { --angle: 360deg; } }

    /* corner ticks */
    .tick {
      position: absolute; width: 14px; height: 14px;
      border-color: var(--accent); border-style: solid; opacity: 0.5;
      transition: width 0.35s cubic-bezier(0.34,1.2,0.64,1),
                  height 0.35s cubic-bezier(0.34,1.2,0.64,1),
                  opacity 0.3s, border-color 0.5s;
    }
    .tick-tl { top:-1px; left:-1px; border-width: 1px 0 0 1px; }
    .tick-br { bottom:-1px; right:-1px; border-width: 0 1px 1px 0; }
    .card:hover .tick { width: 24px; height: 24px; opacity: 1; }

    /* shimmer scanline */
    .shimmer {
      position: absolute; inset: 0; pointer-events: none; z-index: 2;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(var(--accent-rgb),0.06) 48%,
        rgba(var(--accent-rgb),0.10) 50%,
        rgba(var(--accent-rgb),0.06) 52%,
        transparent 100%);
      background-size: 100% 300%; background-position: 0 300%;
      animation: scansweep 7s ease-in-out 3s infinite;
    }
    @keyframes scansweep {
      0%   { background-position: 0 300%; opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { background-position: 0 -100%; opacity: 0; }
    }

    /* index */
    .index {
      position: absolute; top: 24px; right: 28px;
      font-size: 10px; letter-spacing: 0.18em;
      color: var(--text-muted); transition: color 0.5s;
      opacity: 0; animation: fadein 1s ease 2.2s forwards;
    }

    /* label */
    .label {
      font-size: 10px; font-weight: 400; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--accent);
      opacity: 0; transform: translateX(-10px);
      animation: slidelabel 0.9s cubic-bezier(0.22,1,0.36,1) 1.1s forwards;
      margin-bottom: 40px; display: flex; align-items: center; gap: 12px;
      transition: color 0.5s;
    }
    .label-line {
      display: block; height: 1px; background: var(--accent);
      opacity: 0.6; width: 0;
      animation: lineexpand 0.7s ease 1.7s forwards;
      transition: background 0.5s;
    }
    @keyframes slidelabel { to { opacity:1; transform: translateX(0); } }
    @keyframes lineexpand { to { width: 28px; } }

    /* statement: each word gets .word class via JS */
    .statement {
      font-family: 'Cormorant Garant', serif; font-weight: 300;
      font-size: clamp(38px, 6vw, 68px); line-height: 1.12;
      letter-spacing: -0.01em; color: var(--text-primary);
      transition: color 0.5s;
    }
    .word {
      display: inline-block; opacity: 0; transform: translateY(18px);
      animation: wordrise 0.75s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes wordrise { to { opacity:1; transform: translateY(0); } }
    .statement em { font-style: italic; color: var(--accent); transition: color 0.5s; }

    /* em shimmer hover */
    .statement em:hover {
      animation: goldflicker 0.4s ease;
    }
    @keyframes goldflicker {
      0%,100% { opacity:1; }
      30%     { opacity:0.5; }
      60%     { opacity:0.85; }
    }

    /* divider */
    .divider {
      height: 1px; margin: 40px 0;
      background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
      transform: scaleX(0); transform-origin: left;
      animation: divline 0.9s cubic-bezier(0.22,1,0.36,1) 2s forwards;
    }
    @keyframes divline { to { transform: scaleX(1); } }

    /* instagram link */
    .ig-link {
      position: absolute; bottom: 26px; left: 28px;
      display: flex; align-items: center; gap: 9px;
      text-decoration: none;
      opacity: 0; animation: fadein 0.8s ease 2.4s forwards;
      transition: opacity 0.3s;
    }
    .ig-link:hover { opacity: 0.85 !important; }
    .ig-icon {
      width: 18px; height: 18px; flex-shrink: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1), filter 0.3s;
    }
    .ig-link:hover .ig-icon {
      transform: scale(1.2) rotate(-8deg);
      filter: drop-shadow(0 0 5px rgba(var(--accent-rgb),0.6));
    }
    .ig-handle {
      font-size: 10px; letter-spacing: 0.14em;
      color: var(--text-muted); text-transform: lowercase;
      transition: color 0.3s;
    }
    .ig-link:hover .ig-handle { color: var(--accent); }

    /* meta */
    .meta {
      display: flex; justify-content: space-between; align-items: center;
      opacity: 0; animation: fadein 0.8s ease 2.2s forwards;
    }
    .meta-note {
      font-size: 11px; letter-spacing: 0.12em;
      color: var(--text-muted); text-transform: uppercase; transition: color 0.5s;
    }
    .verified {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 0.10em;
      color: var(--text-muted); text-transform: uppercase; transition: color 0.5s;
    }
    .verified-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
      animation: pulse 2.5s ease-in-out infinite; transition: background 0.5s;
    }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow: 0 0 10px var(--accent); }
      50%     { opacity:0.35; box-shadow: 0 0 3px var(--accent); }
    }

    /* stamp */
    .stamp {
      margin-top: 40px; font-size: 10px; letter-spacing: 0.25em;
      color: var(--stamp-color); text-align: center; text-transform: uppercase;
      opacity: 0; animation: fadein 1s ease 2.8s forwards; transition: color 0.5s;
    }

    /* ── MOBILE RESPONSIVENESS ── */
    @media (max-width: 600px) {
      html, body { overflow: auto; height: auto; min-height: 100%; }

      .scene {
        position: relative;
        min-height: 100svh;
        padding: 80px 20px 36px;
        justify-content: flex-start;
        padding-top: max(80px, env(safe-area-inset-top, 80px));
      }

      .theme-toggle { top: 20px; right: 20px; }

      .card {
        width: 100%;
        padding: 36px 28px 72px;
      }

      .index { top: 16px; right: 18px; }

      .label { font-size: 9px; margin-bottom: 28px; }

      .statement {
        font-size: clamp(32px, 11vw, 46px);
      }

      .divider { margin: 28px 0; }

      /* IG link: pull out of absolute on mobile, inline after divider */
      .ig-link {
        position: relative;
        bottom: auto; left: auto;
        display: flex;
        margin-bottom: 20px;
        opacity: 0;
        animation: fadein 0.8s ease 2.4s forwards;
      }

      /* meta stacks on very narrow screens */
      .meta { flex-wrap: wrap; gap: 10px; }

      .stamp {
        margin-top: 24px;
        font-size: 9px;
        letter-spacing: 0.18em;
        padding: 0 10px;
        line-height: 1.7;
      }

      /* reduce orb sizes on mobile */
      .orb-a { width: 360px; height: 360px; }
      .orb-b { width: 160px; height: 160px; }
      .orb-c { width: 120px; height: 120px; }

      /* no tilt on touch */
    }

    @media (max-width: 380px) {
      .card { padding: 28px 20px 68px; }
      .statement { font-size: 9vw; }
      .label { font-size: 8px; letter-spacing: 0.18em; }
      .stamp { display: none; }
    }

    @keyframes fadein { to { opacity: 1; } }
  </style>
</head>
<body>

  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>
  <canvas id="particles"></canvas>
  <div class="grid"></div>
  <div class="spotlight" id="spotlight"></div>

  <button class="theme-toggle" id="toggle" aria-label="Toggle theme">
    <div class="toggle-track">
      <span class="toggle-icon icon-sun">☀</span>
      <span class="toggle-icon icon-moon">☽</span>
      <div class="toggle-thumb"></div>
    </div>
  </button>

  <div class="scene">
    <div class="card" id="card">
      <div class="border-glow"></div>
      <div class="shimmer"></div>
      <div class="tick tick-tl"></div>
      <div class="tick tick-br"></div>

      <div class="index">001 / 001</div>

      <div class="label">
        <span class="label-line"></span>
        Verified Universal Truth
      </div>

      <div class="statement" id="statement">
        Lalla Rania<br/>
        is <em>always</em><br/>
        right.
      </div>

      <div class="divider"></div>

      <a class="ig-link" href="https://instagram.com/ArabianRaniah" target="_blank" rel="noopener" aria-label="Instagram @ArabianRaniah">
        <svg class="ig-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="var(--accent)" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="4.5" stroke="var(--accent)" stroke-width="1.5"/>
          <circle cx="17.5" cy="6.5" r="1" fill="var(--accent)"/>
        </svg>
        <span class="ig-handle">@ArabianRaniah</span>
      </a>

      <!-- Object.values($0.childNodes)[0].childNodes[1].childNodes[0].innerText.split("\n").join(": ") -->

      <div class="meta">
        <span class="meta-note">Non-negotiable</span>
        <span class="verified">
          <span class="verified-dot"></span>
          Confirmed
        </span>
      </div>
    </div>

    <div class="stamp">This is not an opinion &nbsp;·&nbsp; This is fact &nbsp;·&nbsp; Est. always</div>
  </div>

  <script>
    /* ── theme ── */
    document.getElementById('toggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });

    /* ── word reveal ── */
    (function() {
      const stmt = document.getElementById('statement');
      let idx = 0;
      const BASE = 1.45;

      function wrap(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          const parts = node.textContent.split(/(\s+)/);
          const frag = document.createDocumentFragment();
          parts.forEach(p => {
            if (/\S/.test(p)) {
              const s = document.createElement('span');
              s.className = 'word';
              s.textContent = p;
              s.style.animationDelay = (BASE + idx * 0.13) + 's';
              idx++;
              frag.appendChild(s);
            } else {
              frag.appendChild(document.createTextNode(p));
            }
          });
          node.replaceWith(frag);
        } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName !== 'BR') {
          Array.from(node.childNodes).forEach(wrap);
        }
      }
      Array.from(stmt.childNodes).forEach(wrap);
    })();

    /* ── cursor spotlight ── */
    const spot = document.getElementById('spotlight');
    document.addEventListener('mousemove', e => {
      spot.style.left = e.clientX + 'px';
      spot.style.top  = e.clientY + 'px';
      spot.style.opacity = '1';
    });
    document.addEventListener('mouseleave', () => spot.style.opacity = '0');

    /* ── card magnetic tilt (desktop only) ── */
    const card = document.getElementById('card');
    let tiltRAF;
    const isTouchDevice = () => window.matchMedia('(hover: none)').matches;

    card.addEventListener('mousemove', e => {
      if (isTouchDevice()) return;
      cancelAnimationFrame(tiltRAF);
      tiltRAF = requestAnimationFrame(() => {
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - 0.5;
        const y = (e.clientY - r.top)  / r.height - 0.5;
        card.style.transition = 'transform 0.08s ease, border-color 0.5s, background 0.5s';
        card.style.transform  = `perspective(900px) rotateY(${x*9}deg) rotateX(${-y*7}deg) scale(1.015)`;
      });
    });
    card.addEventListener('mouseleave', () => {
      if (isTouchDevice()) return;
      cancelAnimationFrame(tiltRAF);
      card.style.transition = 'transform 0.7s cubic-bezier(0.22,1,0.36,1), border-color 0.5s, background 0.5s';
      card.style.transform  = 'perspective(900px) rotateY(0deg) rotateX(0deg) scale(1)';
    });

    /* ── floating particles ── */
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let pts = [], raf2;

    function isDark() { return document.documentElement.classList.contains('dark'); }

    function initPts() {
      cancelAnimationFrame(raf2);
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      pts = Array.from({length: 60}, () => ({
        x:  Math.random() * canvas.width,
        y:  Math.random() * canvas.height,
        r:  Math.random() * 1.5 + 0.4,
        vx: (Math.random() - 0.5) * 0.28,
        vy: (Math.random() - 0.5) * 0.28 - 0.07,
        phase: Math.random() * Math.PI * 2,
      }));
      drawPts();
    }

    function drawPts() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const [r,g,b] = isDark() ? [192,36,58] : [155,21,37];
      pts.forEach(p => {
        p.phase += 0.016;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        const a = (0.15 + 0.12 * Math.sin(p.phase)) * (isDark() ? 0.7 : 1);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
        ctx.fill();
      });
      raf2 = requestAnimationFrame(drawPts);
    }

    initPts();
    window.addEventListener('resize', initPts);
  </script>
</body>
</html>
