app = "nexus-tournament-frontend"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile.fly.frontend"

  [build.args]
    NEXT_PUBLIC_API_URL = "https://nexus-tournament-backend.fly.dev"

[env]
  HOSTNAME = "0.0.0.0"
  NEXT_PUBLIC_API_URL = "https://nexus-tournament-backend.fly.dev"
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
